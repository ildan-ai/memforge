name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shellcheck (tools/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Lint shell tools
        shell: bash
        run: |
          fail=0
          for f in tools/*; do
            if [ -f "$f" ] && head -1 "$f" | grep -qE '^#!.*(bash|sh)'; then
              echo "::group::shellcheck $f"
              # grandfather SC2010/SC2034/SC2035/SC2086 on pre-existing tools; fix inline as code evolves.
              shellcheck -e SC2010,SC2034,SC2035,SC2086 "$f" || fail=1
              echo "::endgroup::"
            fi
          done
          exit $fail

  markdownlint:
    name: Markdown lint (spec + docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.48.0
      - name: Lint markdown
        # grandfather noisy style rules on pre-existing docs; strict on new content comes later.
        run: markdownlint '**/*.md' --ignore node_modules --disable MD013 MD025 MD026 MD031 MD032 MD033 MD034 MD040 MD041

  spec-version-check:
    name: Spec version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Verify SPEC.md + VERSION agree
        shell: bash
        run: |
          if [ ! -f spec/SPEC.md ] || [ ! -f spec/VERSION ]; then
            echo "::warning::spec/SPEC.md or spec/VERSION missing; skipping"
            exit 0
          fi
          version=$(tr -d '[:space:]' < spec/VERSION)
          if ! grep -qFw "$version" spec/SPEC.md; then
            echo "::error::spec/VERSION ($version) not mentioned anywhere in spec/SPEC.md"
            exit 1
          fi
          echo "OK: spec version $version referenced in SPEC.md"

  secrets-scan:
    name: Secrets scan (gitleaks MIT binary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - name: Install gitleaks (MIT CLI, sha256-verified)
        env:
          GITLEAKS_VERSION: "8.21.2"
          GITLEAKS_SHA256: "5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks detect
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  workflow-schema:
    name: Validate workflow schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - run: pip install 'check-jsonschema==0.37.1'
      - run: check-jsonschema --builtin-schema github-workflows .github/workflows/*.yml

  pytest:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,dlp]'
      - name: Run pytest
        run: pytest -q

  # NOTE: a DCO job previously lived here. It was removed because external
  # PRs are paused pending CLA infrastructure. Once the CLA flow lands, a
  # CLA-bot status check replaces this; do not reintroduce the DCO job,
  # which would contradict the CLA decision.
