name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shellcheck (tools/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Lint shell tools
        shell: bash
        run: |
          fail=0
          for f in tools/*; do
            if [ -f "$f" ] && head -1 "$f" | grep -qE '^#!.*(bash|sh)'; then
              echo "::group::shellcheck $f"
              # grandfather SC2010/SC2034/SC2035/SC2086 on pre-existing tools; fix inline as code evolves.
              shellcheck -e SC2010,SC2034,SC2035,SC2086 "$f" || fail=1
              echo "::endgroup::"
            fi
          done
          exit $fail

  markdownlint:
    name: Markdown lint (spec + docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install markdownlint-cli
        # Pinned version; --ignore-scripts blocks install-time lifecycle scripts
        # from transitive deps (hostile-contributor supply-chain hardening).
        run: npm install -g --ignore-scripts markdownlint-cli@0.48.0
      - name: Lint markdown
        # grandfather noisy style rules on pre-existing docs; strict on new content comes later.
        # MD024 disabled because Keep a Changelog format mandates duplicate
        # `### Added` / `### Changed` headings across version blocks; siblings_only
        # config would cover this, but blanket-disabling it is cleaner and the
        # CHANGELOG headings are the only recurring duplicates in the tree.
        run: markdownlint '**/*.md' --ignore node_modules --disable MD013 MD024 MD025 MD026 MD031 MD032 MD033 MD034 MD040 MD041 MD060

  spec-version-check:
    name: Spec version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Verify SPEC.md + VERSION agree
        shell: bash
        run: |
          if [ ! -f spec/SPEC.md ] || [ ! -f spec/VERSION ]; then
            echo "::warning::spec/SPEC.md or spec/VERSION missing; skipping"
            exit 0
          fi
          version=$(tr -d '[:space:]' < spec/VERSION)
          if ! grep -qFw "$version" spec/SPEC.md; then
            echo "::error::spec/VERSION ($version) not mentioned anywhere in spec/SPEC.md"
            exit 1
          fi
          echo "OK: spec version $version referenced in SPEC.md"

  package-version-check:
    name: Package version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Assert __version__, installed metadata, and CHANGELOG agree
        shell: bash
        run: |
          # The installed wheel metadata is the source of truth; __version__ is
          # single-sourced from it. Guard against a CHANGELOG that never names
          # the shipping version. Catches the version-drift class (ci-02).
          meta=$(python -c "from importlib.metadata import version; print(version('ildan-memforge'))")
          attr=$(python -c "import memforge; print(memforge.__version__)")
          echo "metadata=$meta  __version__=$attr"
          if [ "$meta" != "$attr" ]; then
            echo "::error::memforge.__version__ ($attr) != installed metadata ($meta)"
            exit 1
          fi
          if ! grep -qE "^## \[$meta\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$meta]' heading for the shipping version"
            exit 1
          fi
          echo "OK: version $meta consistent across metadata, __version__, and CHANGELOG"

  secrets-scan:
    name: Secrets scan (gitleaks MIT binary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Install gitleaks (MIT CLI, sha256-verified)
        env:
          GITLEAKS_VERSION: "8.21.2"
          GITLEAKS_SHA256: "5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks detect
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  supply-chain-audit:
    name: Supply-chain audit (pip-audit on runtime deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - name: Audit the shipped runtime dependency tree for known vulnerabilities
        shell: bash
        run: |
          # Resolve the package's actual runtime deps in a clean env, then audit
          # them with pip-audit (OSV/PyPI advisories). The local unpublished
          # package is excluded (pip-audit cannot resolve it on PyPI). --strict
          # fails on any finding OR any dependency that cannot be audited.
          python -m venv /tmp/auditenv
          /tmp/auditenv/bin/pip install --quiet --upgrade pip
          /tmp/auditenv/bin/pip install --quiet .
          /tmp/auditenv/bin/pip freeze | grep -viE '^ildan-memforge|^-e ' > /tmp/runtime-reqs.txt
          echo "runtime deps audited:"; cat /tmp/runtime-reqs.txt
          pip install --quiet pip-audit
          pip-audit --strict -r /tmp/runtime-reqs.txt

  workflow-schema:
    name: Validate workflow schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - run: pip install 'check-jsonschema==0.37.1'
      - run: check-jsonschema --builtin-schema github-workflows .github/workflows/*.yml

  pytest:
    name: Pytest (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,dlp]'
      - name: Run pytest
        run: pytest -q

  # NOTE: a DCO job previously lived here. It was removed because external
  # PRs are paused pending CLA infrastructure. Once the CLA flow lands, a
  # CLA-bot status check replaces this; do not reintroduce the DCO job,
  # which would contradict the CLA decision.
