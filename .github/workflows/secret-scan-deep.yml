name: Secret scan (deep, verified)

# Consumer workflow: delegates to the reusable in ildan-ci-templates.
# The schedule trigger lives here (workflow_call cannot carry a schedule).
# SHA-pinned per Panel-fold B2: supply-chain risk -- @main moves, a SHA is immutable.
# Reusable at: ildan-ai/ildan-ci-templates/.github/workflows/secret-scan-deep.yml
# Pin: 43e117405a2b2a6b64ed6d7c941122951e892f76 (PR #2 merge, 2026-05-26)
#
# memforge is a public PyPI package; highest blast radius if any credential leaks.
# fail_on_findings: true is mandatory here.

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan:
    uses: ildan-ai/ildan-ci-templates/.github/workflows/secret-scan-deep.yml@43e117405a2b2a6b64ed6d7c941122951e892f76
    with:
      fail_on_findings: true
