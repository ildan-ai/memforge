name: Secret scan (deep, verified)

# Weekly full-history secret scan with credential verification.
# Complements the per-PR gitleaks job in ci.yml:
#   - gitleaks (MIT)         runs on every PR and push: fast, regex-based, blocking.
#   - TruffleHog (AGPL-3.0)  runs weekly on full history with --only-verified:
#                            confirms whether a found credential is actually live.
#
# License rationale: AGPL-3.0 permitted for CI tooling per the three-tier
# license policy (runtime strict / CI moderate / services operator choice).

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: secret-scan-deep-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trufflehog:
    name: TruffleHog full-history verified scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab  # v3.95.3
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified --no-update
