name: Release to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - name: Install build backend
        run: pip install 'build==1.2.2'
      - name: Verify pyproject version matches tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c 'import tomllib,sys; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')
          echo "tag=${tag}  pkg=${pkg}"
          if [ "${tag}" != "${pkg}" ]; then
            echo "ERROR: tag '${tag}' does not match pyproject version '${pkg}'"
            exit 1
          fi
      - name: Build distributions
        run: python -m build
      - name: Inspect dist
        run: ls -la dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # OIDC trusted publishing: PyPI verifies the OIDC token issued by GitHub
    # Actions and matches it against the Trusted Publisher binding configured
    # on the PyPI project. No long-lived API token is stored in repo secrets.
    # Setup (one-time, on PyPI side):
    #   https://pypi.org/manage/project/ildan-memforge/settings/publishing/
    #     -> Add a new publisher with:
    #          owner: ildan-ai
    #          repository: memforge
    #          workflow: release.yml
    #          environment: pypi
    environment:
      name: pypi
      url: https://pypi.org/project/ildan-memforge/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          skip-existing: true
